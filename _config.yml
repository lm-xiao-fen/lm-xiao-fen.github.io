# ------------------------
# Basic Site Info
# ------------------------

lang: zh-CN
timezone: Asia/Shanghai

title: xf_blog
tagline: xiaofen’s jekyll blog      
description: >
  xf 的技术博客与随笔，记录 Web / Cloudflare / GitHub / 开发与折腾

url: "https://lm-xiao-fen.github.io"  
baseurl: ""

# Chirpy 必须用 remote_theme        
remote_theme: cotes2020/jekyll-theme-chirpy

# ------------------------
# Author & Social
# ------------------------

github:
  username: lm-xiao-fen

social:
  name: lm-xiao-fen
  email: G114514g@yeah.net
  links:
    - https://github.com/lm-xiao-fen    
    # - https://twitter.com/lm_xiao_fen                        

# ------------------------
# Theme Appearance
# ------------------------

theme_mode: dark   # light | dark | 留空 = 跟随系统

# avatar: /assets/img/avatar.png   # 可选，没有就先删掉

toc: true

# ------------------------
# Pagination  
# ------------------------

paginate: 10

# ------------------------
# Comments（先关掉，后面再开）
# ------------------------

comments:
  provider:  # disqus | utterances | giscus  

# ------------------------
# Collections（Chirpy 必须）
# ------------------------

collections:
  tabs:
    output: true
    sort_by: order

# ------------------------
# Defaults（不要乱改）
# ------------------------

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: false
      permalink: /posts/:title/

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# ------------------------
# Markdown & Highlight
# ------------------------

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# ------------------------
# Assets
# ------------------------

sass:
  style: compressed

# ------------------------
# Exclude
# ------------------------

exclude:
  - README.md
  - LICENSE
  - docs
  - tools
