name: Create Symbolic Link
on: [push]

permissions:
  contents: write

jobs:
  create-symlink:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Create symbolic link
        run: |
          # Ensure plain ASCII spaces (no NBSP). Create submodule if missing.
          if [ ! -d "assets/lib" ] && ! git config --file .gitmodules --get-regexp path | grep -q "assets/lib"; then
            git submodule add https://github.com/cotes2020/chirpy-static-assets.git assets/lib
            git config --global user.email "aaaaaabbbbbb1999@outlook.com"
            git config --global user.name "lm-xiao-fen"
            git add .
            git commit -m "Update symlink" || true
            git push
          fi
