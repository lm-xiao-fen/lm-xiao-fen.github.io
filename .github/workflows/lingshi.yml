name: Create Symbolic Link
on: [push]

jobs:
  create-symlink:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Create symbolic link
        run: |
          git submodule add https://github.com/lm-xiao-fen/lm-xiao-fen.github.io_stop.git assets/lib        
          git config --global user.email "aaaaaabbbbbb1999@outlook.com"                            
          git config --global user.name "lm-xiao-fen"    
          git add .
          git commit -m "Update symlink" || exit 0
          git push
