<footer class="sub-footer">  
  <div class="container">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.author | default: site.title }}. All rights reserved.</p>  
    <p>
      {% if site.github_username %}
        <a href="https://github.com/lm-xiaofen">GitHub</a> ·          
      {% endif %}
      {% if site.twitter_username %}  
        <a href="https://twitter.com/{{ site.twitter_username }}">Twitter</a> ·
      {% endif %}
      {% if site.email %}
        <a href="mailto:{{ site.email }}">Email</a>
      {% endif %}
    </p>
  </div>
</footer>
